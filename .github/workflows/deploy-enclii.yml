name: Deploy via Enclii

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push nexus-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.nexus-api
          push: true
          tags: |
            ghcr.io/madfam-org/autoswarm-nexus-api:${{ steps.meta.outputs.sha }}
            ghcr.io/madfam-org/autoswarm-nexus-api:latest

      - name: Build and push office-ui
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.office-ui
          push: true
          tags: |
            ghcr.io/madfam-org/autoswarm-office-ui:${{ steps.meta.outputs.sha }}
            ghcr.io/madfam-org/autoswarm-office-ui:latest

      - name: Build and push colyseus
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.colyseus
          push: true
          tags: |
            ghcr.io/madfam-org/autoswarm-colyseus:${{ steps.meta.outputs.sha }}
            ghcr.io/madfam-org/autoswarm-colyseus:latest

  notify-enclii:
    name: Notify Enclii
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Set image tag
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: POST lifecycle callback to Enclii
        run: |
          curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.ENCLII_DEPLOY_TOKEN }}" \
            https://api.enclii.dev/v1/callbacks/lifecycle-event \
            -d '{
              "event": "image_pushed",
              "project": "madfam-platform",
              "commit_sha": "${{ github.sha }}",
              "short_sha": "${{ steps.meta.outputs.sha }}",
              "images": [
                "ghcr.io/madfam-org/autoswarm-nexus-api:${{ steps.meta.outputs.sha }}",
                "ghcr.io/madfam-org/autoswarm-office-ui:${{ steps.meta.outputs.sha }}",
                "ghcr.io/madfam-org/autoswarm-colyseus:${{ steps.meta.outputs.sha }}"
              ],
              "ref": "${{ github.ref }}",
              "triggered_by": "${{ github.actor }}"
            }'
