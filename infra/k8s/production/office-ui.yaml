apiVersion: apps/v1
kind: Deployment
metadata:
  name: office-ui
  namespace: autoswarm
  labels:
    app.kubernetes.io/name: office-ui
    app.kubernetes.io/part-of: autoswarm-office
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: office-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: office-ui
        app.kubernetes.io/part-of: autoswarm-office
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: autoswarm-sa
      containers:
        - name: office-ui
          image: ghcr.io/madfam-org/autoswarm-office-ui:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          env:
            - name: NEXT_PUBLIC_API_URL
              value: https://api.autoswarm.madfam.io
            - name: NEXT_PUBLIC_COLYSEUS_URL
              value: wss://colyseus.autoswarm.madfam.io
---
apiVersion: v1
kind: Service
metadata:
  name: office-ui
  namespace: autoswarm
  labels:
    app.kubernetes.io/name: office-ui
    app.kubernetes.io/part-of: autoswarm-office
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: office-ui
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: office-ui
  namespace: autoswarm
  labels:
    app.kubernetes.io/name: office-ui
    app.kubernetes.io/part-of: autoswarm-office
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: office.autoswarm.madfam.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: office-ui
                port:
                  number: 80
