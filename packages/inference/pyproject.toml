[project]
name = "autoswarm-inference"
version = "0.1.0"
description = "AI inference abstraction with sensitivity-based routing"
requires-python = ">=3.12"
dependencies = [
  "httpx>=0.28.1",
  "pydantic>=2.10.5",
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.43.0"]
openai = ["openai>=1.59.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["autoswarm_inference"]
