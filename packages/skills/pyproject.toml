[project]
name = "autoswarm-skills"
version = "0.1.0"
description = "AgentSkills standard integration for AutoSwarm Office"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.10.5",
  "pyyaml>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["autoswarm_skills"]
